      model_endpoints:
        qwen3-8b: http://localhost:8000/v1/chat/completions
        qwen3-32b: http://localhost:8001/v1/chat/completions
      grpc_max_msg_size_mb: 16
      timeout_seconds: 120
      retry_count: 2
