        candidate_pool_size: 50
        min_lexical_overlap: 1
        min_combined_score: 0.42
        weights:
          embed: 0.5
          lexical: 0.2
          tag: 0.1
          name: 0.1
          category: 0.1
        use_category_filter: true
        category_confidence_threshold: 0.7
        allow_tools: [docs.search, tickets.lookup]
        block_tools: [admin.delete]
    looper:
