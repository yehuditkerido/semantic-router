        source:
          path: knowledge_bases/privacy/
          manifest: labels.json
        threshold: 0.55
        prototype_scoring:
          enabled: true
          cluster_similarity_threshold: 0.9
          max_prototypes: 8
          best_weight: 0.75
          top_m: 2
          margin_threshold: 0.0
        label_thresholds:
          prompt_injection: 0.7
        groups:
          security_containment:
            - prompt_injection
            - credential_exfiltration
            - jailbreak_role
            - system_prompt_extraction
          privacy_policy:
            - proprietary_code
            - internal_document
            - pii
            - business_strategy
            - trade_secret_ip
            - operational_infrastructure
            - locality_directive
            - customer_data
          frontier_reasoning:
            - architecture_analysis
            - root_cause_analysis
            - multi_step_tradeoffs
          local_standard:
            - generic_coding
            - simple_task
            - general_knowledge
          private:
            - prompt_injection
            - credential_exfiltration
            - jailbreak_role
            - system_prompt_extraction
            - proprietary_code
            - internal_document
            - pii
            - business_strategy
            - trade_secret_ip
            - operational_infrastructure
            - locality_directive
            - customer_data
          public:
            - architecture_analysis
            - root_cause_analysis
            - multi_step_tradeoffs
            - generic_coding
            - simple_task
            - general_knowledge
        metrics:
          - name: private_vs_public
            type: group_margin
            positive_group: private
            negative_group: public
      - name: mmlu_kb
        source:
          path: knowledge_bases/mmlu/
          manifest: labels.json
        threshold: 0.25
        groups:
          escalate:
            - biology
            - business
            - computer science
            - economics
            - history
            - math
            - other
            - philosophy
            - psychology
          keep:
            - chemistry
            - engineering
            - health
            - law
            - physics
        metrics:
          - name: escalate_vs_keep
            type: group_margin
            positive_group: escalate
            negative_group: keep
    modules:
      prompt_compression:
        enabled: true
        max_tokens: 4096
        min_length: 512
        skip_signals: [jailbreak, pii]
        textrank_weight: 0.4
        position_weight: 0.2
        tfidf_weight: 0.3
        position_depth: 0.1
      prompt_guard:
        enabled: true
        model_ref: prompt_guard
        model_id: models/mmbert32k-jailbreak-detector-merged
        threshold: 0.7
        use_cpu: true
        use_modernbert: false
        use_mmbert_32k: true
        jailbreak_mapping_path: models/mmbert32k-jailbreak-detector-merged/jailbreak_type_mapping.json
        use_vllm: false
      classifier:
        domain:
          model_ref: domain_classifier
          model_id: models/mmbert32k-intent-classifier-merged
          threshold: 0.5
          use_cpu: true
          use_modernbert: false
          use_mmbert_32k: true
          category_mapping_path: models/mmbert32k-intent-classifier-merged/category_mapping.json
          fallback_category: other
        mcp:
          enabled: true
          transport_type: stdio
          command: python
          args: [-m, mcp_classifier]
          env:
            MCP_MODE: local
          url: http://localhost:9010
          tool_name: classify
          threshold: 0.6
          timeout_seconds: 15
        pii:
          model_ref: pii_classifier
          model_id: models/mmbert32k-pii-detector-merged
          threshold: 0.9
          use_cpu: true
          use_mmbert_32k: true
          pii_mapping_path: models/mmbert32k-pii-detector-merged/pii_type_mapping.json
        preference:
          use_contrastive: true
          embedding_model: models/preference-encoder
          prototype_scoring:
            enabled: true
            cluster_similarity_threshold: 0.9
            max_prototypes: 8
            best_weight: 0.75
            top_m: 2
            margin_threshold: 0.0
      complexity:
        prototype_scoring:
          enabled: true
          cluster_similarity_threshold: 0.9
          max_prototypes: 6
          best_weight: 0.75
          top_m: 2
          margin_threshold: 0.0
      hallucination_mitigation:
        enabled: true
        on_hallucination_detected: annotate
        fact_check:
          model_ref: fact_check_classifier
          model_id: models/mmbert32k-factcheck-classifier-merged
          threshold: 0.65
          use_cpu: true
          use_mmbert_32k: true
        detector:
          model_ref: hallucination_detector
          model_id: models/mom-halugate-detector
          threshold: 0.82
          use_cpu: true
          min_span_length: 2
          min_span_confidence: 0.6
          context_window_size: 50
          enable_nli_filtering: true
          nli_entailment_threshold: 0.75
        explainer:
          model_ref: hallucination_explainer
          model_id: models/mom-halugate-explainer
          threshold: 0.9
          use_cpu: true
      feedback_detector:
        enabled: true
        model_ref: feedback_detector
        model_id: models/mmbert32k-feedback-detector-merged
        threshold: 0.7
        use_cpu: true
        use_modernbert: false
        use_mmbert_32k: true
        feedback_mapping_path: models/mmbert32k-feedback-detector-merged/feedback_mapping.json
      modality_detector:
        enabled: true
        prompt_prefixes:
          - generate an image of
          - draw
          - create a picture of
        method: hybrid
        classifier:
          model_path: models/mmbert32k-modality-router-merged
          use_cpu: true
        keywords:
          - image
          - picture
          - illustration
        both_keywords:
          - explain and illustrate
          - describe with an image
        confidence_threshold: 0.7
        lower_threshold_ratio: 0.7
